// ================== ローマ字パターン（Python版完全移植） ==================

function getPatterns(ch, nextCh=null) {
    const base = {
        "あ":["a"],"い":["i","yi"],"う":["u","wu","whu"],"え":["e"],"お":["o"],
        "か":["ka","ca"],"き":["ki"],"く":["ku","cu"],"け":["ke"],"こ":["ko","co"],
        "さ":["sa"],"し":["shi","si","ci"],"す":["su"],"せ":["se","ce"],"そ":["so"],
        "た":["ta"],"ち":["chi","ti"],"つ":["tsu","tu"],"て":["te"],"と":["to"],
        "な":["na"],"に":["ni"],"ぬ":["nu"],"ね":["ne"],"の":["no"],
        "は":["ha"],"ひ":["hi"],"ふ":["fu","hu"],"へ":["he"],"ほ":["ho"],
        "ま":["ma"],"み":["mi"],"む":["mu"],"め":["me"],"も":["mo"],
        "や":["ya"],"ゆ":["yu"],"よ":["yo"],
        "ら":["ra"],"り":["ri"],"る":["ru"],"れ":["re"],"ろ":["ro"],
        "わ":["wa"],"を":["wo"],
        "が":["ga"],"ぎ":["gi"],"ぐ":["gu"],"げ":["ge"],"ご":["go"],
        "ざ":["za"],"じ":["ji","zi"],"ず":["zu"],"ぜ":["ze"],"ぞ":["zo"],
        "だ":["da"],"ぢ":["di"],"づ":["du"],"で":["de"],"ど":["do"],
        "ば":["ba"],"び":["bi"],"ぶ":["bu"],"べ":["be"],"ぼ":["bo"],
        "ぱ":["pa"],"ぴ":["pi"],"ぷ":["pu"],"ぺ":["pe"],"ぽ":["po"],
    };

    if (ch === "ん") {
        const patterns = ["nn","xn"];
        if (!["あ","い","う","え","お","や","ゆ","よ","な","に","ぬ","ね","の"].includes(nextCh)) {
            patterns.push("n");
        }
        return patterns;
    }

    if (ch === "っ") {
        return ["ltu","xtu","ltsu","xtsu"];
    }

    return base[ch] || [ch];
}

function applySmall(candidates, small) {
    const table = {
        "ゃ": ["xya","lya","ya"],
        "ゅ": ["xyu","lyu","yu"],
        "ょ": ["xyo","lyo","yo"],
    };

    const normal = {
        "ゃ": "ya",
        "ゅ": "yu",
        "ょ": "yo",
    };

    const newList = [];
    for (const c of candidates) {
        let base = c;
        while (base && "aiueo".includes(base[base.length-1])) {
            base = base.slice(0, -1);
        }
        const lastVowel = c.slice(base.length);
        for (const p of table[small]) {
            newList.push(base + lastVowel + p);
        }
        newList.push(base + lastVowel + normal[small]);
    }
    return newList;
}

function buildCandidates(hira) {
    let candidates = [""];
    let i = 0;
    while (i < hira.length) {
        const ch = hira[i];

        if (["ゃ","ゅ","ょ"].includes(ch)) {
            candidates = applySmall(candidates, ch);
            i++;
            continue;
        }

        if (ch === "ー") {
            const newList = [];
            for (const base of candidates) {
                newList.push(base + "-");
            }
            candidates = newList;
            i++;
            continue;
        }

        const nextCh = (i+1 < hira.length) ? hira[i+1] : null;
        const patterns = getPatterns(ch, nextCh);

        const newList = [];
        for (const base of candidates) {
            for (const p of patterns) {
                newList.push(base + p);
            }
        }
        candidates = newList;
        i++;
    }
    return candidates;
}

// ================== newProblem（完全オフライン版） ==================

async function newProblem() {
    problemReady = false;

    let newText;
    while (true) {
        newText = currentList[Math.floor(Math.random() * currentList.length)];
        if (newText !== lastText) break;
    }
    currentText = newText;
    lastText = newText;

    const hira = newText;

    typed = "";
    currentRoma = "";
    currentCandidates = buildCandidates(hira);

    let i = 0;
    while (i < hira.length) {
        const ch = hira[i];

        if (i + 1 < hira.length) {
            const pair = hira.slice(i, i+2);
            if (pair === "しゃ") { currentRoma += "sha"; i += 2; continue; }
            if (pair === "しゅ") { currentRoma += "shu"; i += 2; continue; }
            if (pair === "しょ") { currentRoma += "sho"; i += 2; continue; }
            if (pair === "ちゃ") { currentRoma += "cha"; i += 2; continue; }
            if (pair === "ちゅ") { currentRoma += "chu"; i += 2; continue; }
            if (pair === "ちょ") { currentRoma += "cho"; i += 2; continue; }
        }

        if (ch === "っ") {
            if (i + 1 < hira.length) {
                const nextCh = hira[i+1];
                currentRoma += getPatterns(nextCh)[0][0];
            }
            i++;
            continue;
        }

        if (ch === "ん") {
            currentRoma += "nn";
        } else {
            currentRoma += getPatterns(ch)[0];
        }
        i++;
    }

    firstKeyTime = null;
    problemStartTime = performance.now() / 1000;
    problemStartInputs = totalInputs;

    if (!prefixMapCache[currentText]) {
        const prefixMap = {};
        for (const c of currentCandidates) {
            if (c.length === 0) continue;
            const head = c[0];
            if (!prefixMap[head]) prefixMap[head] = [];
            prefixMap[head].push(c);
        }
        prefixMapCache[currentText] = prefixMap;
    }

    problemReady = true;
}

function rgb(arr) {
    return `rgb(${arr[0]},${arr[1]},${arr[2]})`;
}

function drawTextMultiline(text, fontSize, color, x, y, maxWidth) {
    ctx.font = `${fontSize}px "Hiragino Sans", sans-serif`;
    ctx.fillStyle = color;
    const chars = [...text];
    const lines = [];
    let currentLine = "";

    for (const ch of chars) {
        const testLine = currentLine + ch;
        const w = ctx.measureText(testLine).width;
        if (w > maxWidth) {
            lines.push(currentLine);
            currentLine = ch;
        } else {
            currentLine = testLine;
        }
    }
    if (currentLine) lines.push(currentLine);

    const lineHeight = fontSize * 1.2;
    lines.forEach((line, i) => {
        ctx.fillText(line, x, y + i * lineHeight);
    });
}

function drawRomaWithColor(fullText, typedLen, fontSize, x, y, maxWidth, typedColor, restColor) {
    ctx.font = `${fontSize}px "Hiragino Sans", sans-serif`;
    let cx = x;
    let cy = y;
    const lineHeight = fontSize * 1.2;

    for (let i = 0; i < fullText.length; i++) {
        const ch = fullText[i];
        const color = (i < typedLen) ? typedColor : restColor;
        ctx.fillStyle = color;
        const w = ctx.measureText(ch).width;
        if (cx + w > x + maxWidth) {
            cx = x;
            cy += lineHeight;
        }
        ctx.fillText(ch, cx, cy);
        cx += w;
    }
}

        words: { best_score:0, best_rank:"Starter", best_wpm:0, best_max_wpm:0, best_rkpm:0 },
        shorts:{ best_score:0, best_rank:"Starter", best_wpm:0, best_max_wpm:0, best_rkpm:0 },

}

function loadRecords() {
    try {
        const s = localStorage.getItem("records");
        if (!s) return defaultRecords();
        const data = JSON.parse(s);
        if (!data.words) return defaultRecords();
        return data;
    } catch {
        return defaultRecords();
    }
}

    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if (state === "title") {
        if (mx >= settingsButton.x && mx <= settingsButton.x+settingsButton.w &&
            my >= settingsButton.y && my <= settingsButton.y+settingsButton.h) {
            const keys = Object.keys(themes);
            const idx = keys.indexOf(currentTheme);
            currentTheme = keys[(idx + 1) % keys.length];
            return;
        }

        if (mx >= highscoreButton.x && mx <= highscoreButton.x+highscoreButton.w &&
            my >= highscoreButton.y && my <= highscoreButton.y+highscoreButton.h) {
            state = "highscore";
            return;
        }

        for (const name in buttons) {
            const b = buttons[name];
            if (mx >= b.x && mx <= b.x+b.w && my >= b.y && my <= b.y+b.h) {
                if (name === "単語") { currentList = words_hira; currentMode="words"; }
                if (name === "短文") { currentList = shorts_hira; currentMode="shorts"; }
                if (name === "長文") { currentList = longs_hira; currentMode="longs"; }

                missCount = 0;
                totalInputs = 0;
                startTime = performance.now()/1000;
                pauseTotal = 0;
                maxWpm = 0;
                latencyList = [];
                rkpm = 0;
                resultSaved = false;

                state = "countdown";
                countdownStart = performance.now()/1000;
                return;
            }
        }
    }
});

document.addEventListener("keydown", (e) => {
    if (state === "game") {
        if (e.key.length === 1) {
            const char = e.key.toLowerCase();
            if (!(/[a-z\-]/.test(char))) return;
            if (showing) return;
            if (!problemReady) return;

            totalInputs += 1;

            const prefixMap = prefixMapCache[currentText] || {};
            typed += char;

            let newList;
            if (typed.length === 1) {
                newList = prefixMap[typed[0]] || [];
            } else {
                newList = currentCandidates.filter(c => c.startsWith(typed));
            }

            if (newList.length > 0) {
                if (firstKeyTime === null) firstKeyTime = performance.now()/1000;
                currentCandidates = newList;
                currentRoma = newList[0];
            } else {
                missCount += 1;
                typed = typed.slice(0, -1);
                return;
            }

            if (currentCandidates.includes(typed)) {
                const now = performance.now()/1000;
                const problemInputs = totalInputs - problemStartInputs;
                const problemElapsed = now - problemStartTime;
                const wpm = (problemElapsed > 0) ? Math.floor((problemInputs/problemElapsed)*60) : 0;
                if (wpm > maxWpm) maxWpm = wpm;

                if (firstKeyTime !== null) {
                    const latency = firstKeyTime - problemStartTime;
                    if (latency >= 0 && latency <= 3) latencyList.push(latency);
                    showLatency = Math.round(latency*100)/100;
                } else showLatency = 0;

                showWpm = wpm;
                showTime = now;
                pauseStart = now;
                showing = true;
            }
        }
    }

    if (state === "highscore" && e.key === "Enter") state = "title";

    if (state === "result") {
        if (performance.now()/1000 - resultEnterTime > 0.3) {
            if (e.key === "Enter") state = "title";
        }
    }
});

function loop() {
    const theme = themes[currentTheme];
    ctx.fillStyle = rgb(theme.bg);
    ctx.fillRect(0,0,WIDTH,HEIGHT);

    const now = performance.now()/1000;

    if (showing && now - showTime > 1.2) {
        showing = false;
        pauseTotal += now - pauseStart;
        newProblem();
    }

    let elapsed;
    if (showing) elapsed = showTime - startTime - pauseTotal;
    else elapsed = now - startTime - pauseTotal;

    if (state === "game" && elapsed >= gameTime) {
        state = "result";
        resultEnterTime = now;
        resultSaved = false;
    }

    ctx.textBaseline = "top";

    if (state === "title") {
        ctx.fillStyle = rgb(theme.text);
        ctx.font = '70px "Hiragino Sans"';
        ctx.fillText("TypeMaster", 240, 100);

        ctx.fillStyle = rgb(theme.button_bg);
        ctx.fillRect(settingsButton.x, settingsButton.y, settingsButton.w, settingsButton.h);
        ctx.fillStyle = rgb(theme.button_text);
        ctx.font = '30px "Hiragino Sans"';
        ctx.fillText("C", settingsButton.x+5, settingsButton.y+5);

        ctx.fillStyle = rgb(theme.button_bg);
        ctx.fillRect(highscoreButton.x, highscoreButton.y, highscoreButton.w, highscoreButton.h);
        ctx.fillStyle = rgb(theme.button_text);
        ctx.fillText("H", highscoreButton.x+15, highscoreButton.y+5);

        for (const name in buttons) {
            const b = buttons[name];
            ctx.fillStyle = "rgb(70,70,70)";
            ctx.fillRect(b.x, b.y, b.w, b.h);
            ctx.fillStyle = rgb(theme.text);
            ctx.font = '40px "Hiragino Sans"';
            ctx.fillText(name, b.x+100, b.y+10);
        }
    }

    else if (state === "countdown") {
        const cd = now - countdownStart;
        let text;
        if (cd < 1) text = "3";
        else if (cd < 2) text = "2";
        else if (cd < 3) text = "1";
        else if (cd < 4) text = "START";
        else {
            newProblem();
            startTime = performance.now()/1000;
            state = "game";
            requestAnimationFrame(loop);
            return;
        }

        ctx.fillStyle = rgb(theme.text);
        ctx.font = '70px "Hiragino Sans"';
        const w = ctx.measureText(text).width;
        ctx.fillText(text, (WIDTH-w)/2, (HEIGHT-70)/2);
    }

    else if (state === "game") {
        const remain = Math.max(0, Math.floor(gameTime - elapsed));
        ctx.fillStyle = rgb(theme.text);
        ctx.font = '30px "Hiragino Sans"';
        ctx.fillText(`残り: ${remain}s`, 10, 10);

        ctx.fillStyle = rgb(theme.miss);
        ctx.fillText(`ミス: ${missCount}`, 10, 40);

        if (!showing) {
            drawTextMultiline(currentText, 40, rgb(theme.text), 100, 120, 700);
            drawRomaWithColor(currentRoma, typed.length, 40, 100, 260, 700,
                rgb(theme.typed), rgb(theme.subtext));
        } else {
            ctx.fillStyle = rgb(theme.text);
            ctx.font = '40px "Hiragino Sans"';
            ctx.fillText(`${showWpm} WPM`, 330, 180);
            ctx.fillText(`${showLatency}s`, 330, 230);
        }
    }

    else if (state === "result") {
        const wpm = Math.floor((totalInputs/gameTime)*60);
        const acc = totalInputs ? Math.floor(((totalInputs-missCount)/totalInputs)*100) : 0;
        const avgLatency = latencyList.length ? (latencyList.reduce((a,b)=>a+b,0)/latencyList.length) : 0;

        const effectiveInputs = Math.max(totalInputs - 15, 1);
        let effectiveTime = gameTime - 15*avgLatency;
        if (effectiveTime < 1) effectiveTime = 1;

        rkpm = Math.floor((effectiveInputs/effectiveTime)*60);
        const score = Math.floor(Math.pow(wpm,1.2)*(acc/100));

        const rank = getRank(score);

        const rec = records[currentMode];
        if (score > rec.best_score) { rec.best_score = score; rec.best_rank = rank; }
        if (wpm > rec.best_wpm) rec.best_wpm = wpm;
        if (maxWpm > rec.best_max_wpm) rec.best_max_wpm = maxWpm;
        if (rkpm > rec.best_rkpm) rec.best_rkpm = rkpm;

        if (!resultSaved) { saveRecords(records); resultSaved = true; }

        const colorArr = rankColors[rank];
        ctx.fillStyle = rgb(colorArr);
        ctx.font = '40px "Hiragino Sans"';
        ctx.fillText(`ランク: ${rank}`, 300, 120);

        ctx.fillStyle = rgb(theme.text);
        ctx.fillText(`スコア: ${score}`, 300, 160);
        ctx.fillText(`WPM: ${wpm}`, 300, 210);
        ctx.fillText(`正確性: ${acc}%`, 300, 260);

        ctx.fillStyle = rgb(theme.miss);
        ctx.fillText(`ミス数: ${missCount}`, 300, 310);

        ctx.fillStyle = rgb(theme.text);
        ctx.fillText(`最高WPM: ${maxWpm}`, 300, 360);
        ctx.fillText(`RKPM: ${rkpm}`, 300, 410);

        ctx.font = '24px "Hiragino Sans"';
        ctx.fillText("Enterでタイトルに戻る", 300, 450);
    }

    else if (state === "highscore") {
    ctx.fillStyle = rgb(theme.text);
    ctx.font = '70px "Hiragino Sans"';
    ctx.fillText("High Scores", 250, 80);

    ctx.font = '30px "Hiragino Sans"';
    ctx.fillText(`単語: ${records.words.best_score} (${records.words.best_rank})`, 250, 180);
    ctx.fillText(`短文: ${records.shorts.best_score} (${records.shorts.best_rank})`, 250, 220);
    ctx.fillText(`長文: ${records.longs.best_score} (${records.longs.best_rank})`, 250, 260);
}

        ctx.font = '30px "Hiragino Sans"';
        ctx.fillText(`最高スコア: ${rec.best_score} (${rec.best_rank})`, 250, 180);
        ctx.fillText(`最高WPM: ${rec.best_wpm}`, 250, 220);
        ctx.fillText(`最高最高WPM: ${rec.best_max_wpm}`, 250, 260);
        ctx.fillText(`最高RKPM: ${rec.best_rkpm}`, 250, 300);

        ctx.fillText("Enterで戻る", 250, 360);
    }

    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

</script>
</body>
</html>
